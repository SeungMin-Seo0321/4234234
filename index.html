<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초간단 무료 AI 이미지 생성기</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        input[type="text"] { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background-color: #000; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; }
        button:hover { background-color: #333; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        #statusMsg { margin-top: 15px; font-weight: bold; }
        #resultImage { margin-top: 20px; max-width: 100%; border-radius: 8px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h2>🎨 완전 무료 AI 이미지 (No API Key)</h2>
    <p>영어로 프롬프트를 입력해보세요!</p>
    
    <input type="text" id="promptInput" value="A futuristic cyberpunk city, neon lights, highly detailed" placeholder="예: A futuristic cyberpunk city">
    <button id="generateBtn" onclick="generateImage()">이미지 생성하기</button>

    <p id="statusMsg"></p>
    <img id="resultImage" alt="생성된 이미지 결과" />
</div>

<script>
    function generateImage() {
        const prompt = document.getElementById('promptInput').value;
        const btn = document.getElementById('generateBtn');
        const statusMsg = document.getElementById('statusMsg');
        const resultImg = document.getElementById('resultImage');

        if (!prompt.trim()) {
            alert("프롬프트를 입력해주세요!");
            return;
        }

        // 상태 변경
        btn.disabled = true;
        btn.innerText = "생성 중...";
        statusMsg.style.color = "blue";
        statusMsg.innerText = "⏳ 이미지를 생성하는 중입니다... (빠릅니다!)";
        resultImg.style.display = "none";

        // 🔥 마법의 URL: 프롬프트를 주소 뒤에 붙이기만 하면 이미지를 줍니다! (Flux 모델 기반)
        // seed 값을 랜덤으로 주어 매번 새로운 이미지가 나오게 설정
        const randomSeed = Math.floor(Math.random() * 100000);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${randomSeed}&width=512&height=512&nologo=true`;

        // 이미지 로딩 처리
        resultImg.onload = function() {
            statusMsg.style.color = "green";
            statusMsg.innerText = "✅ 이미지 생성 완료!";
            resultImg.style.display = "block";
            btn.disabled = false;
            btn.innerText = "이미지 생성하기";
        };

        resultImg.onerror = function() {
            statusMsg.style.color = "red";
            statusMsg.innerText = "❌ 이미지 생성에 실패했습니다.";
            btn.disabled = false;
            btn.innerText = "이미지 생성하기";
        };

        // 이미지 출처(src)를 방금 만든 URL로 변경 (이 순간 바로 생성 요청이 들어갑니다)
        resultImg.src = imageUrl;
    }
</script>

</body>
</html>

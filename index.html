<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서승민의개쩌는거</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px 20px; background: #f5f5f5; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 20px; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 5px; display: block; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #222; color: #fff; border: none; padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #444; }
        button:disabled { background: #999; cursor: not-allowed; }
        #preview { max-width: 100%; max-height: 200px; display: none; margin-bottom: 15px; border-radius: 4px; }
        #resultImage { max-width: 100%; display: none; margin-top: 15px; border-radius: 4px; }
        #downloadBtn { display: none; background: #0066cc; }
        #downloadBtn:hover { background: #005bb5; }
        .status { margin: 10px 0; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>이미지 생성해줄게 ㅇㅇ</h2>
    
    <label>이미지 업로드. 필수는아니다 ㅇㅇ</label>
    <input type="file" id="imageInput" accept="image/*">
    <img id="preview" alt="업로드 미리보기">

    <label>프롬프트 입력해라</label>
    <input type="text" id="promptInput" placeholder="예: 우주복을 입은 귀여운 준수">
    
    <button id="generateBtn" onclick="generateImage()">생성 ㄱ?</button>
    <div id="status" class="status"></div>

    <img id="resultImage" alt="생성 결과">
    <button id="downloadBtn" onclick="downloadImage()">다운로드 ㄱ?</button>
</div>

<script>
    // 1. 이미지 업로드 미리보기 처리
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const preview = document.getElementById('preview');
                preview.src = event.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    let currentImageUrl = '';

    // 2. 번역 및 이미지 생성
    async function generateImage() {
        const prompt = document.getElementById('promptInput').value;
        const btn = document.getElementById('generateBtn');
        const status = document.getElementById('status');
        const resultImg = document.getElementById('resultImage');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!prompt.trim()) return alert("프롬프트를 입력해주세요.");

        btn.disabled = true;
        status.innerText = "제미나이 번역 및 이미지 생성 중...";
        resultImg.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            // Vercel 서버로 한국어 프롬프트 전송
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            // 제미나이가 번역한 영어 프롬프트
            const translatedPrompt = data.translatedPrompt;
            
            // Pollinations 무료 생성 API 호출
            const randomSeed = Math.floor(Math.random() * 99999);
            currentImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(translatedPrompt)}?seed=${randomSeed}&width=512&height=512&nologo=true`;

            resultImg.src = currentImageUrl;
            
            resultImg.onload = function() {
                status.innerText = `완료! (번역: ${translatedPrompt})`;
                resultImg.style.display = "block";
                downloadBtn.style.display = "block";
                btn.disabled = false;
            };

            resultImg.onerror = function() {
                throw new Error("이미지를 불러오는데 실패했습니다.");
            };

        } catch (error) {
            status.innerText = "에러: " + error.message;
            btn.disabled = false;
        }
    }

    // 3. 다운로드 기능
    async function downloadImage() {
        if (!currentImageUrl) return;
        try {
            // CORS 우회를 위해 blob으로 받아와서 다운로드
            const response = await fetch(currentImageUrl);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `generated_image_${Date.now()}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        } catch (error) {
            alert("다운로드 중 오류가 발생했습니다.");
        }
    }
</script>

</body>
</html>
